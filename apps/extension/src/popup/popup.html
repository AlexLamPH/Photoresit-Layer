<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f19;
      color: #e2e2e8;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .logo {
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .version {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
    }

    .mode-section {
      margin-bottom: 12px;
    }

    .mode-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 8px;
    }

    .mode-buttons {
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: transparent;
      color: #e2e2e8;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .mode-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .mode-btn.active {
      background: rgba(167, 139, 250, 0.2);
      border-color: rgba(167, 139, 250, 0.5);
      color: #a78bfa;
    }

    .status-bar {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .status-bar span {
      color: #a78bfa;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Photoresist Layer</div>
    <div class="version">v0.1</div>
  </div>

  <div class="mode-section">
    <div class="mode-label">Mode</div>
    <div class="mode-buttons">
      <button class="mode-btn" data-mode="browse">Browse</button>
      <button class="mode-btn" data-mode="inspect">Inspect</button>
      <button class="mode-btn" data-mode="annotate">Annotate</button>
    </div>
  </div>

  <div class="status-bar">
    Current: <span id="status">browse</span>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
